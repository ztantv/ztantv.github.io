    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            /* Palette completamente Bianco e Nero */
            --primary: #ffffff;
            --secondary: #cccccc;
            --black: #050505;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            font-family: 'Orbitron', sans-serif;
            color: var(--white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- NUOVA INTRO CINEMATOGRAFICA --- */
        #intro-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--black);
            display: flex; justify-content: center; align-items: center;
            z-index: 999999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .intro-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        .intro-text {
            font-size: clamp(2rem, 10vw, 5rem); /* Si adatta perfettamente al mobile */
            font-weight: 900;
            color: var(--white);
            text-transform: uppercase;
            white-space: nowrap; /* Impedisce che il testo vada a capo su schermi piccoli */
            animation: cinematicFocus 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cinematicFocus {
            0% { 
                filter: blur(20px); 
                transform: scale(1.5); 
                opacity: 0; 
                letter-spacing: clamp(10px, 5vw, 30px); 
            }
            100% { 
                filter: blur(0); 
                transform: scale(1); 
                opacity: 1; 
                letter-spacing: clamp(3px, 1.5vw, 12px); 
                text-shadow: 0 0 25px rgba(255,255,255,0.6); 
            }
        }

        .loading-bar-container {
            width: clamp(150px, 40vw, 300px);
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.5s ease forwards 1s; /* Appare dopo 1 secondo */
        }

        .loading-bar-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: var(--white);
            width: 0%;
            animation: loadingFill 1.8s cubic-bezier(0.8, 0, 0.2, 1) forwards 1s;
            box-shadow: 0 0 10px var(--white);
        }

        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes loadingFill {
            0% { width: 0%; }
            40% { width: 60%; } /* Finta pausa di caricamento */
            100% { width: 100%; }
        }

        .fade-out {
            opacity: 0 !important;
            visibility: hidden !important;
        }
        /* --- FINE INTRO --- */

        /* Effetto Disturbo CRT Background (Scala di grigi) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                        linear-gradient(90deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 9999; pointer-events: none;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; } }

        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary);
        }

        .logo-text { font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px var(--primary); font-size: 1.2rem; white-space: nowrap; text-transform: uppercase; }

        .nav-links { display: flex; list-style: none; gap: 20px; flex-wrap: wrap; justify-content: flex-end; }
        .nav-links a { color: var(--white); font-size: 1.4rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--secondary); transform: scale(1.2); text-shadow: 0 0 10px var(--white); }

        /* Giochi Database (Fisso) */
        .games-database {
            margin-top: 90px;
            padding: 40px 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent);
            text-align: center;
        }

        .db-title {
            font-size: 1.4rem; font-weight: 900; letter-spacing: 6px;
            text-shadow: 0 0 15px var(--secondary);
            margin-bottom: 30px; text-transform: uppercase;
        }

        .marquee-wrapper {
            width: 85%; max-width: 1000px; margin: 0 auto;
            overflow: hidden;
        }

        .marquee-content {
            display: flex; justify-content: center; padding: 20px 0;
            width: 100%;
        }

        .marquee-content img { height: 100px; filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3)); border-radius: 12px; }

        /* Hero Section */
        .hero {
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 5%; gap: 40px; text-align: center;
        }

        .hero-content { width: 100%; max-width: 600px; }

        .status-container {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 25px; flex-wrap: wrap;
        }

        .live-badge {
            background: var(--white); color: var(--black); padding: 10px 20px;
            font-size: 0.9rem; font-weight: 900; border-radius: 5px;
            display: none; animation: pulse-live 1.5s infinite;
            white-space: nowrap; box-shadow: 0 0 15px var(--white);
        }

        @keyframes pulse-live { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900;
            line-height: 0.9; margin-bottom: 15px; transition: 0.5s ease; text-transform: uppercase;
        }
        .hero-title span { color: transparent; -webkit-text-stroke: 2px var(--secondary); }
        .hero-title .live-text { display: block; font-size: clamp(1.5rem, 5vw, 2.5rem); color: var(--white); -webkit-text-stroke: 0; text-shadow: 0 0 10px var(--white); margin-top: 10px; }

        .countdown-container { display: none; margin-bottom: 25px; font-size: 1.1rem; letter-spacing: 2px; color: #aaa; }
        .countdown-container .time { display: block; font-size: clamp(1.8rem, 5vw, 2.8rem); color: var(--white); font-weight: 900; text-shadow: 0 0 15px var(--white); margin-top: 5px; }

        .btn-live {
            background: var(--white); color: var(--black); padding: 18px 40px; text-decoration: none; font-weight: 900;
            font-size: 1.1rem; display: inline-block; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); border: none; cursor: pointer; text-align: center;
        }
        .btn-live.btn-explore { background: transparent; border: 2px solid var(--white); color: var(--white); box-shadow: none; }
        .btn-live.btn-explore:hover { background: var(--white); color: var(--black); box-shadow: 0 0 20px var(--white); }
        .btn-live:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .hero-socials { display: flex; gap: 25px; justify-content: center; margin-top: 30px;}
        .hero-socials a { color: var(--white); font-size: 2.2rem; transition: 0.3s; }
        .hero-socials a:hover { color: var(--secondary); transform: scale(1.2); text-shadow: 0 0 10px var(--white); }

        .hero-support-btn { margin-top: 25px; }

        .live-container {
            width: 100%; max-width: 950px; aspect-ratio: 16 / 9;
            border: 4px solid var(--primary); border-radius: 20px;
            overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(255, 255, 255, 0.2); margin: 0 auto;
            position: relative;
        }

        /* Footer */
        footer {
            padding: 50px 5%;
            text-align: center;
            border-top: 1px solid var(--border-glass);
            background: #000;
            color: #555;
            font-size: 0.8rem;
        }

        /* Modal Social */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 10000; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #111; border: 2px solid var(--primary); padding: 30px 20px; border-radius: 20px; text-align: center; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto;}
        
        .social-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 25px; }
        .social-item { background: var(--glass); padding: 18px; border-radius: 12px; text-decoration: none; color: white; transition: 0.3s; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .social-item i { font-size: 2rem; color: var(--white) !important; } 
        .social-item:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-5px); border: 1px solid var(--white); box-shadow: 0 0 10px rgba(255,255,255,0.2);}
        .close-modal { margin-top: 25px; background: none; border: 1px solid #444; color: #888; padding: 12px 25px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; width: 100%;}
        .close-modal:hover { background: #333; color: #fff;}

        /* FIX MOBILE SPECIFICI */
        @media (max-width: 480px) {
            nav { padding: 12px 5%; }
            .logo-text { font-size: 1rem; }
            .nav-links { gap: 12px; }
            .nav-links a { font-size: 1.2rem; }
            .btn-live { padding: 15px 25px; font-size: 1rem; width: 100%;}
            .hero-title { font-size: clamp(2rem, 10vw, 3rem); }
        }

        /* FIX PC/TABLET SPECIFICI */
        @media (min-width: 768px) {
            .social-grid { grid-template-columns: 1fr 1fr; gap: 20px; }
            .twitch-modal-btn { grid-column: span 2; }
            .close-modal { width: auto; }
            .modal-content { padding: 40px; }
        }

        @media (min-width: 1024px) {
            .hero { flex-direction: row; text-align: left; padding: 80px 5%; justify-content: space-between; }
            .status-container { justify-content: flex-start; }
            .hero-socials { justify-content: flex-start; }
            .hero-support-btn { text-align: left; }
            .btn-live { width: auto; }
        }
    </style>
</head>
<body>
    <div id="intro-loader">
        <div class="intro-wrapper">
            <h1 class="intro-text">ZTANTV</h1>
            <div class="loading-bar-container">
                <div class="loading-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="overlay"></div>

    <div class="modal-overlay" id="socialModal">
        <div class="modal-content">
            <h2 style="letter-spacing: 3px;">COLLEGAMENTI</h2>
            <div class="social-grid">
                <a href="https://instagram.com/ztantv" target="_blank" class="social-item"><i class="fab fa-instagram"></i><span>Instagram</span></a>

            </div>
            <button class="close-modal" onclick="toggleModal()">TORNA INDIETRO</button>
        </div>
    </div>

    <nav>
        <div class="logo-text">ZTANTV</div>
        <ul class="nav-links">
            <li><a href="https://instagram.com/ztantv" target="_blank"><i class="fab fa-instagram"></i></a></li>
            <li><a href="https://twitch.tv/ztantv" target="_blank"><i class="fab fa-twitch"></i></a></li>
            <li><a href="https://tiktok.com/@ztantv" target="_blank"><i class="fab fa-tiktok"></i></a></li>
            <li><a href="https://youtube.com/@ztantv" target="_blank"><i class="fab fa-youtube"></i></a></li> 
            <li><a href="https://discord.gg/your_discord_link" target="_blank"><i class="fab fa-discord"></i></a></li>
        </ul>
    </nav>

    <section class="games-database">
        <div class="db-title">GIOCHI IN STREAM</div>
        <div class="marquee-wrapper">
            <div class="marquee-content">
                <img src="img/rocket_league.png" alt="Rocket League">
            </div>
        </div>
    </section>

    <section class="hero">
        <div class="hero-content">
            <div class="status-container">
                <div id="live-badge" class="live-badge"><i class="fab fa-twitch"></i> ORA IN ONDA</div>
                <a href="https://twitch.tv/ztantv" target="_blank" id="status-btn" class="btn-live">Caricamento...</a>
            </div>
            <h1 class="hero-title" id="main-title">ZTAN<span>TV</span></h1>
            
            <div id="countdown-wrapper" class="countdown-container">
                <span id="countdown-text">PROSSIMA STREAM TRA:</span>
                <span class="time" id="countdown-timer">--h --m --s</span>
            </div>
            
            <div class="hero-socials">
                <a href="https://instagram.com/ztantv" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://twitch.tv/ztantv" target="_blank"><i class="fab fa-twitch"></i></a>
                <a href="https://tiktok.com/@ztantv" target="_blank"><i class="fab fa-tiktok"></i></a>

                <a href="https://discord.gg/your_discord_link" target="_blank"><i class="fab fa-discord"></i></a>
            </div>

            <div class="hero-support-btn">
                <a href="https://twitch.tv/ztantv/subscribe" target="_blank" class="btn-live btn-explore">SUPPORTA IL CANALE</a>
            </div>
        </div>
        <div class="live-container">
            <div id="twitch-embed" style="width: 100%; height: 100%;"></div>
        </div>
    </section>

    <footer>
        <p>© 2026 ZTANTV | SITO UFFICIALE®</p>
        <p style="margin-top: 10px; font-size: 0.7rem;">Creato con passione per la community.</p>
    </footer>

    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <script>
        // Logica Animazione Intro (Ora sincronizzata con la barra di caricamento)
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('intro-loader');
                loader.classList.add('fade-out');
                setTimeout(() => { loader.style.display = 'none'; }, 800); 
            }, 3000); // 3 secondi per godersi l'animazione completa
        });

        // Logica Twitch Embed e Countdown
        var embed = new Twitch.Embed("twitch-embed", {
            width: "100%", 
            height: "100%", 
            channel: "ztantv",
            parent: ["ztantv.github.io", "localhost"],
            layout: "video", 
            autoplay: true,
            muted: true,
            playsinline: true,
            allowfullscreen: true
        });

        embed.addEventListener(Twitch.Embed.VIDEO_READY, function() {
            var player = embed.getPlayer();
            player.setMuted(true);
            player.play();
        });

        let countdownInterval;
        let statusKnown = false;

        function updateUI(isLive) {
            if (statusKnown && isLive === false) return; 
            statusKnown = true;

            const btn = document.getElementById('status-btn');
            const badge = document.getElementById('live-badge');
            const title = document.getElementById('main-title');

            if (isLive) {
                stopCountdown();
                btn.innerHTML = "ENTRA IN LIVE";
                btn.classList.remove('btn-explore');
                btn.href = "https://twitch.tv/ztantv";
                btn.onclick = null;
                badge.style.display = "block";
                title.innerHTML = "ZTAN<span>TV</span> <span class='live-text'>È IN ONDA ORA!</span>";
            } else {
                startCountdown();
                btn.innerHTML = "SCOPRI I SOCIAL";
                btn.classList.add('btn-explore');
                btn.href = "#";
                btn.onclick = (e) => { e.preventDefault(); toggleModal(); };
                badge.style.display = "none";
                title.innerHTML = "ZTANTV <br><span>OFFLINE</span>";
            }
        }

        function getNextLiveTime() {
            const now = new Date();
            const liveTime = new Date(now); 
            liveTime.setHours(18, 30, 0, 0);
            const liveTimeEnd = new Date(now); 
            liveTimeEnd.setHours(21, 30, 0, 0);

            if (now >= liveTime && now <= liveTimeEnd) return "SOON";
            if (now < liveTime) return liveTime;
            
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(18, 30, 0, 0);
            return tomorrow;
        }

        function startCountdown() {
            const wrapper = document.getElementById('countdown-wrapper');
            const countdownText = document.getElementById('countdown-text');
            const timerElement = document.getElementById('countdown-timer');
            
            wrapper.style.display = 'block';
            if (countdownInterval) clearInterval(countdownInterval);
            
            const update = () => {
                const target = getNextLiveTime();
                if (target === "SOON") {
                    countdownText.innerText = "LA LIVE INIZIERÀ A BREVE!";
                    countdownText.style.color = "var(--white)";
                    timerElement.style.display = 'none';
                } else {
                    countdownText.innerText = "PROSSIMA STREAM TRA:";
                    countdownText.style.color = "#aaa";
                    timerElement.style.display = 'block';
                    const diff = target - new Date();
                    const h = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                    const m = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
                    const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                    timerElement.innerText = `${h}h ${m}m ${s}s`;
                }
            };
            update();
            countdownInterval = setInterval(update, 1000);
        }

        function stopCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('countdown-wrapper').style.display = 'none';
        }

        embed.addEventListener(Twitch.Embed.VIDEO_PLAY, () => updateUI(true));
        embed.addEventListener(Twitch.Embed.OFFLINE, () => updateUI(false));

        setTimeout(() => {
            if (!statusKnown) {
                const player = embed.getPlayer();
                if (player && player.getPlaybackStats()?.video_res !== "0x0") {
                    updateUI(true);
                } else {
                    updateUI(false);
                }
            }
        }, 5000);

        function toggleModal() { document.getElementById('socialModal').classList.toggle('active'); }
    </script>
</body>
</html>
